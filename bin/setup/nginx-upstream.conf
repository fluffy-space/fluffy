## Shared upstream for the app — generated by NginxBuilder (`php fluffy nginx <domain>`)
## into /etc/nginx/conf.d/, ONE file per app regardless of how many domains point at it.
## Placeholders: _UPSTREAM_ _PORT_
##
## Every site config (sites-available/<domain>) proxy_passes to this one name, so a short
## domain added later needs no upstream of its own — it inherits this. The name comes from
## `upstream` in configs/server.php, which is why all of them agree.
##
## WRITTEN ONCE, then owned by whoever rotates traffic. NginxBuilder will not overwrite an
## existing file: under blue/green this holds the ACTIVE port, and regenerating a site
## config must never silently swing traffic back to the other release. To change the port,
## edit this file (or let the deploy script rewrite it) and reload.

upstream _UPSTREAM_ {
  server 127.0.0.1:_PORT_ fail_timeout=1;

  # KEEPALIVE POOL — the fix for the p99 blow-up. Without this, nginx opens a
  # fresh TCP connection to Swoole for EVERY proxied request (the `Connection ""`
  # + `proxy_http_version 1.1` in the site config are inert unless the pool exists).
  # Under high concurrency that connection churn was the whole nginx-vs-Caddy gap
  # (Tests/performance.md: nginx p99 2278ms -> with keepalive it collapses).
  keepalive 256;
  keepalive_timeout 60s;
  keepalive_requests 100000;
}
