## Per-domain OpenResty (nginx + Lua) site config — generated by NginxBuilder
## (`php fluffy nginx <domain>`). Placeholders: _UPSTREAM_ _ROOT_
## _DOMAIN_ _STATIC_FILES_ _SSL_CERT_ _SSL_KEY_. Http-context tuning (worker/TLS/`$connection_upgrade`
## map) is installed once by scripts/install-openresty-ubuntu24.sh into
## /etc/nginx/conf.d/00-fluffy-tuning.conf — this file relies on it.
##
## Where the `_UPSTREAM_` block itself lives depends on `upstream` in configs/server.php:
## set -> /etc/nginx/conf.d/ (see setup/nginx-upstream.conf), SHARED by every domain of this
## app, so one place holds the app port and traffic rotates for all domains at once — adding
## a short domain then generates this file only. Unset -> the block is inlined above, one per
## domain, and each site carries its own copy of the port.

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;                 # requires nginx/OpenResty >= 1.25.1 (our installer pulls latest)
  server_name _DOMAIN_;

  # Real cert if certbot has one for this domain, else the dev self-signed pair
  # (NginxBuilder picks at generate time — re-run `php fluffy nginx <domain>`
  # after the first issuance to switch a site over).
  ssl_certificate _SSL_CERT_;
  ssl_certificate_key _SSL_KEY_;
  # TLS session reuse + protocol floor live in 00-fluffy-tuning.conf (http ctx)
  # so every site shares one SSL cache — handshakes are the CPU cost at scale.

  access_log off;
  error_log /var/log/nginx/_DOMAIN_.error.log crit;
  root _ROOT_;

  real_ip_header X-Forwarded-For;
  real_ip_recursive on;

  location / {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;

    # Reuse pooled upstream connections; `$connection_upgrade` (from the http-ctx
    # map) is "" for normal requests -> keepalive, or "upgrade" for the Swoole
    # reload WebSocket channel -> transparent upgrade. One rule serves both.
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_pass_request_headers on;

    # File on disk in the repo public root -> serve it; else the app.
    if (!-f $request_filename) {
      proxy_pass http://_UPSTREAM_;
      break;
    }
    try_files $uri $uri/ @staticFiles;
  }

  # Long-cache static asset extensions (repo public root, then external folder).
  location ~* \.(ogg|ogv|svg|svgz|eot|otf|woff|woff2|mp4|ttf|css|rss|atom|js|json|jpg|jpeg|gif|png|ico|zip|tgz|gz|rar|bz2|doc|xls|exe|ppt|tar|mid|midi|wav|bmp|rtf)$ {
    expires max;
    add_header Cache-Control "public, max-age=31536000, immutable";
    log_not_found off;
    access_log off;
    try_files $uri @staticFiles;
  }

  # External, user-managed static/uploads folder (outside the release dir so a
  # deploy never wipes uploads). Miss in both roots -> 404 for a static ext, or
  # the app renders a branded 404 for a non-file path.
  location @staticFiles {
    root _STATIC_FILES_;
  }

  gzip on;
  gzip_disable "msie6";
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_buffers 16 8k;
  gzip_http_version 1.1;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
  gzip_min_length 500;
}

server {
  listen 80;
  listen [::]:80;
  server_name _DOMAIN_;

  # ACME http-01 challenge (`certbot certonly --webroot -w _ROOT_`), served
  # straight off disk. Must be a location, NOT a server-level `return` sibling:
  # a server-context `return` runs in the rewrite phase, before location
  # matching, so it would 301 the challenge too. Renewals therefore never
  # depend on the HTTPS vhost or its cert being healthy.
  location ^~ /.well-known/acme-challenge/ {
    root _ROOT_;
    default_type "text/plain";
    try_files $uri =404;
  }

  location / {
    return 301 https://$server_name$request_uri;
  }
}
