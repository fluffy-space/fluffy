## Custom (branded) domains — ONE catch-all :443 server that serves EVERY custom
## host, choosing the TLS cert at handshake time from Redis by SNI. No nginx reload
## when a new domain comes online. Drop into /etc/nginx/conf.d/ (loaded before
## sites-enabled). Named primary sites (dev.ivi.to, …) match by server_name first
## and win; this default_server catches every other host (the custom domains).
##
## Requires (installed by scripts/install-openresty-ubuntu24.sh):
##   - `lua_shared_dict fluffy_tls 16m;` in the http block (L1 per-worker cert cache)
##   - `resolver` in conf.d/00-fluffy-tuning.conf
## Certs are written to Redis (localhost:6379) by the control-plane issuance job
## (acme.sh --deploy-hook): `tls:cert:<host>` = PEM fullchain, `tls:key:<host>` = PEM key.

server {
  listen 443 ssl default_server;
  listen [::]:443 ssl default_server;
  http2 on;
  server_name _;

  # Placeholder cert so nginx can boot the ssl listener; the Lua block overrides it
  # per-connection. An unknown/unissued SNI keeps this self-signed cert → the browser
  # rejects it (fails closed) — the abuse gate is the ABSENCE of a stored cert.
  ssl_certificate     /etc/ssl/certs/nginx-selfsigned.crt;
  ssl_certificate_key /etc/ssl/private/nginx-selfsigned.key;

  ssl_certificate_by_lua_block {
    local ssl  = require "ngx.ssl"
    local host = ssl.server_name()
    if not host or host == "" then
      return -- no SNI → placeholder cert, browser rejects
    end
    host = string.lower(host)

    -- L1: per-worker shared dict (avoids a Redis hit every handshake).
    local dict = ngx.shared.fluffy_tls
    local pem  = dict:get("crt:" .. host)
    local key  = dict:get("key:" .. host)

    if not pem or not key then
      -- L2: the DB Redis pool on localhost:6378 (noeviction + persistent — NOT the 6379 cache pool,
      -- which runs allkeys-lfu and would EVICT certs). Fast + fail-safe: 200ms timeout, keepalive;
      -- on any miss/error we just return (placeholder cert served → fails closed).
      local redis = require "resty.redis"
      local r = redis:new()
      r:set_timeout(200)
      local ok = r:connect("127.0.0.1", 6378)
      if not ok then return end
      pem = r:get("tls:cert:" .. host)
      key = r:get("tls:key:" .. host)
      r:set_keepalive(10000, 100)
      if not pem or pem == ngx.null or not key or key == ngx.null then
        return -- no cert issued for this host yet
      end
      dict:set("crt:" .. host, pem, 3600)
      dict:set("key:" .. host, key, 3600)
    end

    -- Replace the placeholder with the per-SNI cert for this connection.
    local ok, err = ssl.clear_certs()
    if not ok then ngx.log(ngx.ERR, "fluffy_tls clear_certs: ", err) return end

    local der_cert, e1 = ssl.cert_pem_to_der(pem)
    if not der_cert then ngx.log(ngx.ERR, "fluffy_tls cert pem→der: ", e1) return end
    local ok1, e2 = ssl.set_der_cert(der_cert)
    if not ok1 then ngx.log(ngx.ERR, "fluffy_tls set_der_cert: ", e2) return end

    local der_key, e3 = ssl.priv_key_pem_to_der(key)
    if not der_key then ngx.log(ngx.ERR, "fluffy_tls key pem→der: ", e3) return end
    local ok2, e4 = ssl.set_der_priv_key(der_key)
    if not ok2 then ngx.log(ngx.ERR, "fluffy_tls set_der_priv_key: ", e4) return end
  }

  access_log off;
  error_log /var/log/nginx/custom-domains.error.log crit;
  root /workspace/urlicer-space/public;

  real_ip_header X-Forwarded-For;
  real_ip_recursive on;

  location / {
    proxy_set_header Host $host;                 # the custom host — ShortUrlMiddleware keys on it
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_pass_request_headers on;

    if (!-f $request_filename) {
      proxy_pass http://urlicer_app;
      break;
    }
    try_files $uri $uri/ @app;
  }
  location @app { proxy_pass http://urlicer_app; }
}

# Port 80 for custom domains: serve the ACME HTTP-01 challenge from the shared webroot
# (acme.sh writes tokens there when issuing/renewing a cert), redirect everything else to
# HTTPS. This is the :80 default_server — the stock Debian `default` site's default_server
# must be retired (scripts/install-acme-ubuntu24.sh does this). Named primary sites keep
# their own :80 blocks and win by server_name; this catches the custom (unmatched) hosts.
server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/acme;              # acme.sh --webroot /var/www/acme
    default_type "text/plain";
    try_files $uri =404;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}
